<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Focus - Toolbar</title>
  <link rel="stylesheet" href="toolbar.css">
</head>
<body>
  <div class="toolbar-shell">
    <div class="toolbar" id="toolbar">
      <button class="toolbar-btn" id="toolbar-play-btn" title="Play/Pause">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
      </button>
      <button class="toolbar-btn" id="toolbar-stop-btn" title="Stop">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="6" y="6" width="12" height="12"/>
        </svg>
      </button>
      <button class="toolbar-btn toolbar-extend" id="toolbar-extend-btn" title="Extend +5 minutes">+5</button>
      <div class="toolbar-spacer"></div>
      <button class="toolbar-btn toolbar-preset" id="toolbar-preset-25" title="25/5 (Classic Pomodoro)">25/5</button>
      <button class="toolbar-btn toolbar-preset" id="toolbar-preset-50" title="50/10 (Extended Focus)">50/10</button>
      <div class="toolbar-spacer"></div>
      <button class="toolbar-btn" id="toolbar-settings-btn" title="Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
      <button class="toolbar-btn" id="toolbar-notes-btn" title="Notes">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
      </button>
    </div>

    <div class="toolbar-notes-panel" id="toolbar-notes-panel">
      <div class="toolbar-notes-add">
        <input id="toolbar-note-input" type="text" placeholder="+ New note" />
        <button class="toolbar-notes-add-btn" id="toolbar-note-add-btn">Add</button>
      </div>
      <div class="toolbar-notes-list" id="toolbar-notes-list"></div>
    </div>
  </div>

  <script src="toolbar.js"></script>
</body>
</html>
