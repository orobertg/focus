<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Focus - Toolbar</title>
  <link rel="stylesheet" href="toolbar.css">
</head>
<body>
  <div class="toolbar-shell">
    <div class="toolbar" id="toolbar">
      <div class="toolbar-spacer"></div>
      <button class="toolbar-btn" id="toolbar-settings-btn" title="Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
      <button class="toolbar-btn" id="toolbar-notes-btn" title="Notes">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
      </button>
    </div>

    <div class="toolbar-notes-panel" id="toolbar-notes-panel">
      <div class="project-filter-row" id="project-filter-row" style="display:none"></div>
      <div class="notes-timeline">
        <div class="timeline-add-entry">
          <button class="timeline-add-dot" id="add-note-dot" title="New note">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
              <line x1="5" y1="1.5" x2="5" y2="8.5"/>
              <line x1="1.5" y1="5" x2="8.5" y2="5"/>
            </svg>
          </button>
          <div class="timeline-add-form" id="timeline-add-form">
            <input id="toolbar-note-input" type="text" placeholder="New note..." autocomplete="off" spellcheck="false" />
          </div>
        </div>
        <div id="toolbar-notes-list" class="timeline-list"></div>
      </div>
      <div class="project-picker" id="project-picker">
        <div class="proj-pick-list" id="proj-pick-list"></div>
        <div class="proj-pick-new-row">
          <input id="proj-pick-input" type="text" placeholder="+ New project…" autocomplete="off" spellcheck="false" />
        </div>
      </div>
      <div class="notes-resize-handle" id="notes-resize-handle"></div>
    </div>
  </div>

  <script src="toolbar.js"></script>
</body>
</html>
