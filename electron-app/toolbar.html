<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Focus Bubbles - Toolbar</title>
  <link rel="stylesheet" href="toolbar.css">
</head>
<body>
  <div class="toolbar" id="toolbar">
    <button class="toolbar-btn" id="toolbar-play-btn" title="Play/Pause">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="5 3 19 12 5 21 5 3"/>
      </svg>
    </button>
    <button class="toolbar-btn" id="toolbar-stop-btn" title="Stop">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="6" y="6" width="12" height="12"/>
      </svg>
    </button>
    <div class="toolbar-spacer"></div>
    <button class="toolbar-btn" id="toolbar-notes-btn" title="Notes">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
    </button>
  </div>

  <script src="toolbar.js"></script>
</body>
</html>
