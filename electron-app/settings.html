<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Focus - Settings</title>
  <link rel="stylesheet" href="settings.css">
</head>
<body>
  <div class="settings-container">
    <h1>Settings</h1>
    
    <form id="settings-form">
      <div class="settings-section">
        <h2>Timer Durations</h2>
        
        <div class="setting-item">
          <label for="work-duration">Work Duration</label>
          <div class="input-group">
            <input type="number" id="work-duration" name="workMinutes" min="1" max="120" value="25">
            <span class="unit">minutes</span>
          </div>
        </div>
        
        <div class="setting-item">
          <label for="short-break">Short Break</label>
          <div class="input-group">
            <input type="number" id="short-break" name="shortBreakMinutes" min="1" max="30" value="5">
            <span class="unit">minutes</span>
          </div>
        </div>
        
        <div class="setting-item">
          <label for="long-break">Long Break</label>
          <div class="input-group">
            <input type="number" id="long-break" name="longBreakMinutes" min="5" max="60" value="15">
            <span class="unit">minutes</span>
          </div>
        </div>
        
        <div class="setting-item">
          <label for="cycles">Cycles Before Long Break</label>
          <div class="input-group">
            <input type="number" id="cycles" name="cycleLength" min="1" max="10" value="4">
            <span class="unit">cycles</span>
          </div>
        </div>
      </div>
      
      <div class="settings-section">
        <h2>Notifications</h2>
        
        <div class="setting-item checkbox-item">
          <label for="sound-enabled">
            <input type="checkbox" id="sound-enabled" name="soundEnabled" checked>
            <span>Enable Sound Notifications</span>
          </label>
        </div>
      </div>
      
      <div class="settings-section">
        <h2>Window Behavior</h2>
        
        <div class="setting-item checkbox-item">
          <label for="always-on-top">
            <input type="checkbox" id="always-on-top" name="alwaysOnTop">
            <span>Always on Top</span>
          </label>
          <p class="hint">Keep Focus app above all other windows</p>
        </div>
      </div>
      
      <div class="button-group">
        <button type="button" id="cancel-btn" class="btn btn-secondary">Cancel</button>
        <button type="submit" id="save-btn" class="btn btn-primary">Save Changes</button>
      </div>
    </form>
  </div>
  
  <script src="settings.js"></script>
</body>
</html>
