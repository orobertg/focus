<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Focus</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Container for swipeable panels -->
  <div class="panels-container" id="panels-container">
    <!-- Timer Panel -->
    <div class="panel panel-timer" id="timer-panel">
    <!-- Progress Ring -->
    <svg class="progress-ring" width="180" height="180">
      <circle
        class="progress-ring__circle-bg"
        stroke="rgba(255, 255, 255, 0.1)"
        stroke-width="9"
        fill="transparent"
        r="75"
        cx="90"
        cy="90"
      />
      <circle
        class="progress-ring__circle"
        stroke="#ef4444"
        stroke-width="9"
        fill="transparent"
        r="75"
        cx="90"
        cy="90"
        id="progress-circle"
      />
    </svg>

    <!-- Timer Content (Inside Progress Ring) -->
    <div class="timer-content">
      <!-- Phase Icon -->
      <div class="phase-icon" id="phase-icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M13.73 4a2 2 0 00-3.46 0l-8 14A2 2 0 004 21h16a2 2 0 001.73-3z"/>
          <line x1="12" y1="9" x2="12" y2="13"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
      </div>

      <!-- Timer Display -->
      <div class="timer-display" id="timer-display">25:00</div>

      <!-- Progress Dots -->
      <div class="progress-dots" id="progress-dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>

      <!-- Phase Label -->
      <div class="phase-label" id="phase-label">FOCUS</div>
    </div>

    <!-- Bottom Controls -->
    <div class="bottom-controls">
      <!-- Reset/Restart Button (Left) -->
      <button class="control-btn control-btn-small" id="reset-btn" title="Reset">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
      </button>

      <!-- START/PAUSE Button (Center) -->
      <button class="control-btn control-btn-primary" id="start-pause-btn">
        START
      </button>

      <!-- Settings Button (Right) -->
      <button class="control-btn control-btn-small" id="settings-btn" title="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          <path d="M12 1a11 11 0 0 0 0 22 11 11 0 0 0 0-22z" opacity="0"/>
        </svg>
      </button>
    </div>
    </div>
    <!-- End Timer Panel -->

    <!-- Settings Panel -->
    <div class="panel panel-settings" id="settings-panel">
      <div class="settings-content">
        <h2>Settings</h2>
        
        <div class="setting-group">
          <label>Work Duration</label>
          <div class="input-row">
            <input type="number" id="work-minutes" min="1" max="120" value="25">
            <span>minutes</span>
          </div>
        </div>
        
        <div class="setting-group">
          <label>Short Break</label>
          <div class="input-row">
            <input type="number" id="short-break-minutes" min="1" max="30" value="5">
            <span>minutes</span>
          </div>
        </div>
        
        <div class="setting-group">
          <label>Long Break</label>
          <div class="input-row">
            <input type="number" id="long-break-minutes" min="5" max="60" value="15">
            <span>minutes</span>
          </div>
        </div>
        
        <div class="setting-group">
          <label>Cycles Before Long Break</label>
          <div class="input-row">
            <input type="number" id="cycle-length" min="1" max="10" value="4">
            <span>cycles</span>
          </div>
        </div>
        
        <div class="setting-group checkbox-group">
          <label>
            <input type="checkbox" id="sound-enabled" checked>
            <span>Enable Sound</span>
          </label>
        </div>
        
        <button class="btn-save" id="save-settings-btn">Save & Close</button>
      </div>
    </div>
    <!-- End Settings Panel -->
  </div>

  <script src="renderer.js"></script>
</body>
</html>
