<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Focus</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Container for swipeable panels -->
  <div class="panels-container" id="panels-container">
    <!-- Timer Panel -->
    <div class="panel panel-timer" id="timer-panel">
      <div class="bubble" id="timer-bubble">
    <!-- Progress Ring -->
    <svg class="progress-ring" width="180" height="180">
      <circle
        class="progress-ring__circle-bg"
        stroke="rgba(255, 255, 255, 0.1)"
        stroke-width="9"
        fill="transparent"
        r="75"
        cx="90"
        cy="90"
      />
      <circle
        class="progress-ring__circle"
        stroke="#ef4444"
        stroke-width="9"
        fill="transparent"
        r="75"
        cx="90"
        cy="90"
        id="progress-circle"
      />
    </svg>

    <!-- Timer Content (Inside Progress Ring) -->
    <div class="timer-content">
      <!-- Phase Icon -->
      <div class="phase-icon" id="phase-icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M13.73 4a2 2 0 00-3.46 0l-8 14A2 2 0 004 21h16a2 2 0 001.73-3z"/>
          <line x1="12" y1="9" x2="12" y2="13"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
      </div>

      <!-- Timer Display -->
      <div class="timer-display" id="timer-display">25:00</div>

      <!-- Progress Dots -->
      <div class="progress-dots" id="progress-dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>

      <!-- Phase Label -->
      <div class="phase-label" id="phase-label">FOCUS</div>
    </div>

    <!-- Bottom Controls -->
    <div class="bottom-controls">
      <!-- Reset/Restart Button (Left) -->
      <button class="control-btn control-btn-small" id="reset-btn" title="Reset">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
      </button>

      <!-- START/PAUSE Button (Center) -->
      <button class="control-btn control-btn-primary" id="start-pause-btn">
        START
      </button>

      <!-- Settings Button (Right) -->
      <button class="control-btn control-btn-small" id="settings-btn" title="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
    </div>
      </div>
    </div>
    <!-- End Timer Panel -->

    <!-- Settings Panel -->
    <div class="panel panel-settings" id="settings-panel">
      <!-- Close Button -->
      <button class="close-btn" id="close-settings-btn" title="Close" 
              onclick="window.closeSettings && window.closeSettings(); return false;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="pointer-events: none;">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
      
      <!-- Tab Navigation -->
      <div class="settings-tabs">
        <button class="settings-tab active" data-tab="duration" id="tab-duration">DURATION</button>
        <button class="settings-tab" data-tab="options" id="tab-options">OPTIONS</button>
        <button class="settings-tab" data-tab="notifications" id="tab-notifications">NOTIFICATIONS</button>
      </div>
      
      <!-- Tab Content -->
      <div class="settings-content-wrapper">
        
        <!-- Duration Tab -->
        <div class="settings-tab-content active" id="content-duration">
          
          <div class="setting-row">
            <span class="setting-label">Focus Session</span>
            <div class="setting-controls">
              <button class="nav-btn" id="work-minutes-prev">
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="15 18 9 12 15 6"/>
                </svg>
              </button>
              <span class="setting-value"><span id="work-minutes-value">25</span> min</span>
              <button class="nav-btn" id="work-minutes-next">
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="9 18 15 12 9 6"/>
                </svg>
              </button>
            </div>
          </div>
          
          <div class="setting-row">
            <span class="setting-label">Short break</span>
            <div class="setting-controls">
              <button class="nav-btn" id="short-break-minutes-prev">
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="15 18 9 12 15 6"/>
                </svg>
              </button>
              <span class="setting-value"><span id="short-break-minutes-value">05</span> min</span>
              <button class="nav-btn" id="short-break-minutes-next">
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="9 18 15 12 9 6"/>
                </svg>
              </button>
            </div>
          </div>
          
          <div class="setting-row">
            <span class="setting-label">Long break</span>
            <div class="setting-controls">
              <button class="nav-btn" id="long-break-minutes-prev">
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="15 18 9 12 15 6"/>
                </svg>
              </button>
              <span class="setting-value"><span id="long-break-minutes-value">15</span> min</span>
              <button class="nav-btn" id="long-break-minutes-next">
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="9 18 15 12 9 6"/>
                </svg>
              </button>
            </div>
          </div>
          
          <div class="setting-row">
            <span class="setting-label">Long break after</span>
            <div class="setting-controls">
              <button class="nav-btn" id="cycle-length-prev">
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="15 18 9 12 15 6"/>
                </svg>
              </button>
              <span class="setting-value"><span id="cycle-length-value">4</span> times</span>
              <button class="nav-btn" id="cycle-length-next">
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="9 18 15 12 9 6"/>
                </svg>
              </button>
            </div>
          </div>
          
        </div>
        
        <!-- Options Tab -->
        <div class="settings-tab-content" id="content-options">
          
          <div class="setting-row">
            <span class="setting-label">Sound</span>
            <label class="toggle-switch">
              <input type="checkbox" id="sound-enabled" checked>
              <span class="toggle-slider"></span>
            </label>
          </div>
          
          <div class="setting-row">
            <span class="setting-label">Auto-start Breaks</span>
            <label class="toggle-switch">
              <input type="checkbox" id="auto-start-breaks" checked>
              <span class="toggle-slider"></span>
            </label>
          </div>
          
          <div class="setting-row">
            <span class="setting-label">Auto-start Pomodoros</span>
            <label class="toggle-switch">
              <input type="checkbox" id="auto-start-pomodoros">
              <span class="toggle-slider"></span>
            </label>
          </div>
          
          <div class="setting-row">
            <span class="setting-label">Always on Top</span>
            <label class="toggle-switch">
              <input type="checkbox" id="always-on-top-toggle">
              <span class="toggle-slider"></span>
            </label>
          </div>
          
        </div>
        
        <!-- Notifications Tab -->
        <div class="settings-tab-content" id="content-notifications">
          
          <div class="setting-row">
            <span class="setting-label">Desktop Notifications</span>
            <label class="toggle-switch">
              <input type="checkbox" id="show-notifications" checked>
              <span class="toggle-slider"></span>
            </label>
          </div>
          
        </div>
        
      </div>
    </div>
    <!-- End Settings Panel -->
  </div>

  <script src="renderer.js"></script>
</body>
</html>
