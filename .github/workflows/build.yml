name: Build & Release

on:
  push:
    branches: [main, develop]
    tags: ['v*']                 # Only tagged pushes will publish
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: write                # Needed to create/update Releases on tag builds

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
            eb_target: win
          - os: ubuntu-latest
            name: Linux
            eb_target: linux
          - os: macos-latest
            name: macOS
            eb_target: mac

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # electron-builder reads this when publishing
      # publish on tags only; otherwise don't publish
      PUBLISH_MODE: ${{ startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push' && 'always' || 'never' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: electron-app/package-lock.json   # 👈 lockfile path

      - name: Install deps
        run: npm ci
        working-directory: electron-app                            # 👈 run inside subfolder

      # (Linux only) Needed for AppImage on Ubuntu 22+/24+
      - name: Install libfuse2 (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2

      - name: Build with electron-builder
        working-directory: electron-app
        env:
          # Speed-ups (step-level avoids named-value errors)
          ELECTRON_CACHE: ${{ runner.temp }}/electron
          ELECTRON_BUILDER_CACHE: ${{ runner.temp }}/builder
          # Skip mac identity auto-discovery unless you’re signing
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          echo "Publish mode: $PUBLISH_MODE"
          npx electron-builder --${{ matrix.eb_target }} --publish $PUBLISH_MODE

      # Save artifacts when not publishing (PRs / branch pushes)
      - name: Upload dist artifacts
        if: env.PUBLISH_MODE == 'never'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-dist
          path: electron-app/dist/**

  # (Optional) Summary only when publishing on a tag
  summarize:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push'
    steps:
      - name: Release summary
        run: |
          echo "## Release Created! 🎉" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Packages Built:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Windows (Setup + Portable)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Linux (AppImage, deb, rpm)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ macOS (DMG, ZIP)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the [Releases](https://github.com/${{ github.repository }}/releases) page!" >> $GITHUB_STEP_SUMMARY
